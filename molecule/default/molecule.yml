---
# Project-level Molecule test — validates playbook syntax and variable handling
# Uses delegated driver (no containers) since the full playbook requires live infra.
driver:
  name: default
  options:
    managed: false
    login_cmd_template: ""
    ansible_connection_options:
      ansible_connection: local

platforms:
  - name: localhost
    managed: false

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - syntax
    - converge
    - verify
