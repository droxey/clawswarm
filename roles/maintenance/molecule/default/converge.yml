---
# Converge playbook for maintenance role
# Renders maintenance scripts to a temp directory without requiring root/Docker.
- name: Test maintenance role template rendering
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars:
    openclaw_base_dir: /tmp/molecule-maintenance

    # Secrets (test values)
    backup_encryption_key: "test-fixture-backup-encryption-key-00000000000000000000000000000"
    gateway_token: "test-fixture-gateway-token-0000000000000000000000000000000000000"
    litellm_master_key: "test-fixture-litellm-key-000000000000000000000000000000000000000"

    # Maintenance config
    backup_retention_days: 14
    log_retention_days: 30
    backup_cron_hour: 3
    backup_cron_minute: 0
    token_rotation_day: 1
    token_rotation_hour: 4
    watchdog_interval: 5
    watchdog_restart_threshold: 3
    watchdog_disk_threshold: 85
    watchdog_memory_threshold: 90

    # Unattended upgrades
    auto_reboot: true
    auto_reboot_time: "05:00"

    # Domain
    domain: "test.example.com"

  tasks:
    - name: Create directory tree
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ openclaw_base_dir }}"
        - "{{ openclaw_base_dir }}/monitoring"
        - "{{ openclaw_base_dir }}/monitoring/logs"
        - "{{ openclaw_base_dir }}/monitoring/backups"

    - name: Deploy backup encryption key
      ansible.builtin.copy:
        content: "{{ backup_encryption_key }}"
        dest: "{{ openclaw_base_dir }}/monitoring/.backup-encryption-key"
        mode: "0600"
      no_log: true

    - name: Deploy backup script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/backup.sh.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/backup.sh"
        mode: "0700"

    - name: Deploy token rotation script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/rotate-token.sh.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/rotate-token.sh"
        mode: "0700"

    - name: Deploy watchdog script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/watchdog.sh.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/watchdog.sh"
        mode: "0700"

    - name: Deploy backup verification script
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/verify-backup.sh.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/verify-backup.sh"
        mode: "0700"

    - name: Deploy unattended-upgrades config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/50unattended-upgrades.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/50unattended-upgrades"
        mode: "0644"

    - name: Deploy auto-upgrades config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/20auto-upgrades.j2"
        dest: "{{ openclaw_base_dir }}/monitoring/20auto-upgrades"
        mode: "0644"
