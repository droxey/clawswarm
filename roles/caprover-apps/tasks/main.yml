---
# caprover-apps — Deploy monitoring and management apps via CapRover API
# Runs ONLY on the leader node
# Apps: Prometheus, Grafana, Uptime Kuma, code-server

# ── Authenticate with CapRover ───────────────────────────────────────

- name: Get CapRover auth token
  ansible.builtin.uri:
    url: "https://captain.{{ caprover_root_domain }}/api/v2/login"
    method: POST
    body_format: json
    body:
      password: "{{ caprover_captain_password }}"
    status_code: 200
  register: caprover_login
  no_log: true
  when: caprover_role == 'leader'
  tags: [apps]

- name: Set auth token
  ansible.builtin.set_fact:
    cap_token: "{{ caprover_login.json.data.token }}"
  no_log: true
  when: caprover_role == 'leader'
  tags: [apps]

# ── Prometheus (pre-deploy config files) ───────────────────────────

- name: Prepare Prometheus config
  when:
    - caprover_role == 'leader'
    - caprover_prometheus_enabled | bool
  tags: [apps, prometheus]
  block:
    - name: Ensure Prometheus config directory
      ansible.builtin.file:
        path: /captain/data/config/prometheus
        state: directory
        mode: "0755"

    - name: Deploy Prometheus config
      ansible.builtin.template:
        src: prometheus.yml.j2
        dest: /captain/data/config/prometheus/prometheus.yml
        mode: "0644"

- name: Deploy Prometheus app
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    app:
      name: prometheus
      image: "prom/prometheus:{{ caprover_prometheus_version }}"
      port: 9090
      description: "Prometheus monitoring — scrapes OpenClaw metrics"
      memory_limit: "{{ caprover_prometheus_memory_limit }}"
      cpu_limit: "{{ caprover_prometheus_cpu_limit }}"
      volumes:
        - hostPath: /captain/data/config/prometheus
          containerPath: /etc/prometheus
        - hostPath: /captain/data/prometheus
          containerPath: /prometheus
  when:
    - caprover_role == 'leader'
    - caprover_prometheus_enabled | bool
  tags: [apps, prometheus]

# ── Grafana (pre-deploy config files) ──────────────────────────────

- name: Prepare Grafana config
  when:
    - caprover_role == 'leader'
    - caprover_grafana_enabled | bool
  tags: [apps, grafana]
  block:
    - name: Ensure Grafana provisioning directory
      ansible.builtin.file:
        path: /captain/data/config/grafana/provisioning/datasources
        state: directory
        mode: "0755"
        recurse: true

    - name: Deploy Grafana datasource config
      ansible.builtin.template:
        src: grafana-datasource.yml.j2
        dest: /captain/data/config/grafana/provisioning/datasources/prometheus.yml
        mode: "0644"

- name: Deploy Grafana app
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    app:
      name: grafana
      image: "grafana/grafana-oss:{{ caprover_grafana_version }}"
      port: 3000
      description: "Grafana dashboards — OpenClaw monitoring"
      memory_limit: "{{ caprover_grafana_memory_limit }}"
      cpu_limit: "{{ caprover_grafana_cpu_limit }}"
      no_log: true
      env_vars:
        - key: GF_SECURITY_ADMIN_PASSWORD
          value: "{{ caprover_grafana_admin_password }}"
        - key: GF_SECURITY_ADMIN_USER
          value: admin
        - key: GF_SERVER_ROOT_URL
          value: "https://grafana.{{ caprover_root_domain }}"
        - key: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - key: GF_SECURITY_COOKIE_SECURE
          value: "true"
        - key: GF_SECURITY_STRICT_TRANSPORT_SECURITY
          value: "true"
      volumes:
        - hostPath: /captain/data/grafana
          containerPath: /var/lib/grafana
        - hostPath: /captain/data/config/grafana/provisioning
          containerPath: /etc/grafana/provisioning
  when:
    - caprover_role == 'leader'
    - caprover_grafana_enabled | bool
  tags: [apps, grafana]

# ── Uptime Kuma ────────────────────────────────────────────────────

- name: Deploy Uptime Kuma app
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    app:
      name: uptime-kuma
      image: "louislam/uptime-kuma:{{ caprover_uptimekuma_version }}"
      port: 3001
      description: "Uptime Kuma — external uptime monitoring for OpenClaw"
      memory_limit: "{{ caprover_uptimekuma_memory_limit }}"
      cpu_limit: "{{ caprover_uptimekuma_cpu_limit }}"
      volumes:
        - hostPath: /captain/data/uptime-kuma
          containerPath: /app/data
  when:
    - caprover_role == 'leader'
    - caprover_uptimekuma_enabled | bool
  tags: [apps, uptimekuma]

# ── code-server (VS Code) ─────────────────────────────────────────

- name: Deploy code-server app
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    app:
      name: code-server
      image: "linuxserver/code-server:{{ caprover_codeserver_version }}"
      port: 8443
      description: "VS Code (code-server) — browser-based IDE"
      memory_limit: "{{ caprover_codeserver_memory_limit }}"
      cpu_limit: "{{ caprover_codeserver_cpu_limit }}"
      no_log: true
      env_vars:
        - key: PASSWORD
          value: "{{ caprover_codeserver_password }}"
      volumes:
        - hostPath: /captain/data/code-server
          containerPath: /config
  when:
    - caprover_role == 'leader'
    - caprover_codeserver_enabled | bool
  tags: [apps, codeserver]

# ── RackNerd Exporter ─────────────────────────────────────────────

- name: Deploy RackNerd Exporter app
  ansible.builtin.include_tasks: deploy-app.yml
  vars:
    app:
      name: racknerd-exporter
      image: "ghcr.io/greenlogles/racknerd_exporter:{{ caprover_racknerd_exporter_version }}"
      port: "{{ caprover_racknerd_exporter_port }}"
      description: "RackNerd VPS metrics exporter for Prometheus"
      memory_limit: "{{ caprover_racknerd_exporter_memory_limit }}"
      cpu_limit: "{{ caprover_racknerd_exporter_cpu_limit }}"
      persistent: false
      no_log: true
      env_vars:
        - key: RACKNERD_URL
          value: "{{ caprover_racknerd_url }}"
        - key: RACKNERD_USERNAME
          value: "{{ caprover_racknerd_username }}"
        - key: RACKNERD_PASSWORD
          value: "{{ caprover_racknerd_password }}"
        - key: RACKNERD_PORT
          value: "{{ caprover_racknerd_exporter_port }}"
        - key: LOG_LEVEL
          value: "{{ caprover_racknerd_log_level }}"
  when:
    - caprover_role == 'leader'
    - caprover_racknerd_exporter_enabled | bool
  tags: [apps, racknerd-exporter]

# ── Enable HTTPS for all apps ──────────────────────────────────────

- name: Enable HTTPS on deployed apps
  when: caprover_role == 'leader'
  tags: [apps]
  block:
    - name: Build list of apps to enable SSL
      ansible.builtin.set_fact:
        ssl_apps: >-
          {{
            (caprover_prometheus_enabled | bool) | ternary(['prometheus'], []) +
            (caprover_grafana_enabled | bool) | ternary(['grafana'], []) +
            (caprover_uptimekuma_enabled | bool) | ternary(['uptime-kuma'], []) +
            (caprover_codeserver_enabled | bool) | ternary(['code-server'], [])
          }}

    - name: Enable HTTPS for each app
      ansible.builtin.uri:
        url: "https://captain.{{ caprover_root_domain }}/api/v2/user/apps/appDefinitions/enablecustomdomainssl"
        method: POST
        body_format: json
        body:
          appName: "{{ item }}"
        headers:
          x-captain-auth: "{{ cap_token }}"
        status_code: [200, 400, 500]
      loop: "{{ ssl_apps }}"
      when: caprover_force_ssl | bool
      ignore_errors: true

# ── Display access info ────────────────────────────────────────────

- name: Display deployed app URLs
  when: caprover_role == 'leader'
  tags: [apps]
  ansible.builtin.debug:
    msg: |
      CapRover Swarm — Deployed Apps
      ═══════════════════════════════════════════════════
      CapRover Dashboard : https://captain.{{ caprover_root_domain }}
      {% if caprover_prometheus_enabled | bool %}
      Prometheus         : https://prometheus.{{ caprover_root_domain }}
      {% endif %}
      {% if caprover_grafana_enabled | bool %}
      Grafana            : https://grafana.{{ caprover_root_domain }}
      {% endif %}
      {% if caprover_uptimekuma_enabled | bool %}
      Uptime Kuma        : https://uptime-kuma.{{ caprover_root_domain }}
      {% endif %}
      {% if caprover_codeserver_enabled | bool %}
      code-server        : https://code-server.{{ caprover_root_domain }}
      {% endif %}
      {% if caprover_racknerd_exporter_enabled | bool %}
      RackNerd Exporter  : srv-captain--racknerd-exporter:{{ caprover_racknerd_exporter_port }}/metrics (internal)
      {% endif %}
      ═══════════════════════════════════════════════════
