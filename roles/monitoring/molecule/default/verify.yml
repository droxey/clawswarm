---
# Verify monitoring role outputs
- name: Verify monitoring template rendering
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  vars:
    openclaw_base_dir: /tmp/molecule-monitoring

  tasks:
    - name: Check rendered files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: file_checks
      loop:
        - "{{ openclaw_base_dir }}/compose.monitoring.yml"
        - "{{ openclaw_base_dir }}/config/prometheus.yml"

    - name: Assert files exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "File {{ item.item }} was not created"
      loop: "{{ file_checks.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Read compose.monitoring.yml
      ansible.builtin.slurp:
        src: "{{ openclaw_base_dir }}/compose.monitoring.yml"
      register: compose_content

    - name: Verify compose.monitoring.yml contains expected services
      ansible.builtin.assert:
        that:
          - "'prometheus:' in (compose_content.content | b64decode)"
          - "'grafana:' in (compose_content.content | b64decode)"
          - "'redis-exporter:' in (compose_content.content | b64decode)"
          - "'prom/prometheus:v3.2.1' in (compose_content.content | b64decode)"
          - "'grafana/grafana-oss:11.5.2' in (compose_content.content | b64decode)"
          - "'oliver006/redis_exporter:v1.67.0' in (compose_content.content | b64decode)"
          - "'test.example.com' in (compose_content.content | b64decode)"
        fail_msg: "compose.monitoring.yml is missing expected services or versions"

    - name: Read prometheus.yml
      ansible.builtin.slurp:
        src: "{{ openclaw_base_dir }}/config/prometheus.yml"
      register: prometheus_content

    - name: Verify prometheus.yml contains expected scrape configs
      ansible.builtin.assert:
        that:
          - "'job_name: \"litellm\"' in (prometheus_content.content | b64decode)"
          - "'job_name: \"redis\"' in (prometheus_content.content | b64decode)"
          - "'openclaw-litellm:4000' in (prometheus_content.content | b64decode)"
          - "'openclaw-redis-exporter:9121' in (prometheus_content.content | b64decode)"
        fail_msg: "prometheus.yml is missing expected scrape configurations"
