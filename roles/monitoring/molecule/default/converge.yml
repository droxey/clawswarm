---
# Converge playbook for monitoring role
# Renders all templates to a temporary directory without requiring Docker.
- name: Test monitoring role template rendering
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars:
    openclaw_base_dir: /tmp/molecule-monitoring

    # Image versions
    prometheus_version: "v3.2.1"
    grafana_version: "11.5.2"
    redis_exporter_version: "v1.67.0"

    domain: "test.example.com"

  tasks:
    - name: Create monitoring directory tree
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ openclaw_base_dir }}"
        - "{{ openclaw_base_dir }}/config"

    - name: Deploy monitoring Docker Compose file
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/compose.monitoring.yml.j2"
        dest: "{{ openclaw_base_dir }}/compose.monitoring.yml"
        mode: "0644"

    - name: Deploy Prometheus config
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../templates/prometheus.yml.j2"
        dest: "{{ openclaw_base_dir }}/config/prometheus.yml"
        mode: "0644"
