---
# CapRover Swarm Inventory — 3x KVM VPS @ Racknerd
# Leader: New York | Workers: Chicago, Los Angeles
# All nodes: 8 GB RAM, 150 GB NVMe, Ubuntu 24.04

all:
  children:
    caprover_leader:
      hosts:
        caprover-ny:
          ansible_host: "nyc.bots.ac"
          caprover_role: leader

    caprover_workers:
      hosts:
        caprover-chi:
          ansible_host: 172.245.242.59
          caprover_role: worker
        caprover-la:
          ansible_host: 104.168.79.126
          caprover_role: worker

    caprover:
      children:
        caprover_leader:
        caprover_workers:

  vars:
    ansible_port: "{{ caprover_ssh_port }}"
    ansible_user: "{{ caprover_deploy_user }}"
    ansible_become: true
